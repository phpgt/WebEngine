[script/**/*.es6]
require=node_modules/.bin/esbuild
execute=./node_modules/.bin/esbuild script/script.es6 --bundle --sourcemap --outfile=www/script.js --loader:.es6=js --target=chrome105,firefox105,edge105,safari15

[script/**/*.js]
require=vendor/bin/sync
execute=vendor/bin/sync --pattern "**/*.js" script www/script

[style/**/*.scss]
require=node_modules/.bin/sass
execute=./node_modules/.bin/sass ./style/style.scss www/style.css --source-map --embed-sources --embed-source-map

[style/**/*.css]
require=vendor/bin/sync
execute=vendor/bin/sync --pattern "**/*.css" style www/style

[asset/**/*]
require=vendor/bin/sync
execute=vendor/bin/sync asset/ www/asset --delete --symlink
